# KeepKey Firmware CI Pipeline
#
# FAIL FAST — quick checks gate everything, no wasted compute.
#
# Stage 1: GATE (seconds, no Docker)
#   ├─ lint-format        clang-format diff check
#   ├─ secret-scan        gitleaks credential detection
#   ├─ check-submodules   verify all deps present
#   ├─ cppcheck           static analysis (warnings, errors, portability)
#   └─ complexity         cyclomatic complexity gate (lizard)
#
# Stage 2: BUILD (parallel, gated by Stage 1)
#   ├─ build-emulator     Docker image → artifact
#   └─ build-arm-firmware cross-compile → .bin/.elf
#
# Stage 2b: SECURITY (parallel with builds)
#   └─ codeql             deep semantic security analysis
#
# Stage 3: TEST (parallel, gated by Stage 2)
#   ├─ unit-tests              GoogleTest (make xunit)
#   └─ python-integration      full test suite (304 tests incl. BTC signing)
#
# Stage 4: PUBLISH (master only, gated by Stage 3)
#   └─ publish-emulator   DockerHub push

name: CI

on:
  push:
    branches: [master, develop, 'feature/**', 'fix/**']
  pull_request:
    branches: [master, develop]

env:
  BASE_IMAGE: kktech/firmware:v15
  EMU_IMAGE: kkemu-ci

jobs:
  # ═══════════════════════════════════════════════════════════
  # STAGE 1: GATE — kill bad PRs in seconds
  # ═══════════════════════════════════════════════════════════

  lint-format:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install clang-format
        run: sudo apt-get install -y clang-format-14

      - name: Check code formatting
        run: |
          FAILED=0
          for f in $(find include/keepkey lib/firmware lib/board lib/transport/src \
                     -name '*.c' -o -name '*.h' 2>/dev/null | grep -v generated | grep -v '.pb.'); do
            if ! clang-format-14 --style=file --dry-run --Werror "$f" 2>/dev/null; then
              echo "::warning file=$f::Formatting differs from .clang-format"
              FAILED=1
            fi
          done
          if [ "$FAILED" = "1" ]; then
            echo ""
            echo "Run: clang-format -i <file> to fix formatting"
            echo "Note: treating as warning until codebase is reformatted"
          fi
        # Warn-only until existing code is reformatted
        continue-on-error: true

  secret-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  check-submodules:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify submodules are declared
        run: |
          echo "Checking required submodule declarations..."
          REQUIRED=(
            "deps/crypto/trezor-firmware"
            "deps/device-protocol"
            "deps/python-keepkey"
            "deps/googletest"
            "deps/qrenc/QR-Code-generator"
            "deps/sca-hardening/SecAESSTM32"
          )
          FAILED=0
          for sub in "${REQUIRED[@]}"; do
            if ! grep -q "$sub" .gitmodules; then
              echo "::error::Missing required submodule: $sub"
              FAILED=1
            else
              echo "  ✓ $sub"
            fi
          done
          [ "$FAILED" = "0" ] || exit 1

  cppcheck:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Init required submodules
        run: |
          git submodule update --init deps/crypto/trezor-firmware
          git submodule update --init deps/device-protocol

      - name: Install cppcheck
        run: sudo apt-get install -y cppcheck

      - name: Run static analysis
        run: |
          # Baseline tolerance: 9 known findings in existing code.
          # Tighten to 0 once they are triaged/fixed.
          BASELINE=9

          FINDINGS=$(cppcheck \
            --enable=warning,performance,portability \
            --inline-suppr \
            --suppress=missingIncludeSystem \
            --suppress=unmatchedSuppression \
            -I include/ \
            -I deps/crypto/trezor-firmware/crypto \
            -I deps/device-protocol \
            -DSTM32F2 \
            --std=c99 \
            --template='::warning file={file},line={line}::{severity} ({id}): {message}' \
            lib/firmware/ lib/board/ lib/transport/src/ include/keepkey/ 2>&1 \
            | grep -cE '::warning' || true)

          echo ""
          echo "Findings: $FINDINGS (baseline: $BASELINE)"

          if [ "$FINDINGS" -gt "$BASELINE" ]; then
            echo "::error::New cppcheck findings detected ($FINDINGS > baseline $BASELINE)"
            exit 1
          else
            echo "Within baseline tolerance — PASS"
          fi

  complexity:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install lizard
        run: pip install lizard

      - name: Check function complexity
        run: |
          # Baseline tolerance: 7 functions with CCN > 40 in existing code.
          # Tighten to 0 as legacy functions are refactored.
          BASELINE_CCN40=7

          echo "── Complexity report ──"

          # Report all functions CCN > 20 as warnings (informational)
          lizard lib/firmware/ lib/board/ lib/transport/src/ \
            -C 20 -L 300 -w \
            -x "*/generated/*" -x "*/.pb.*" 2>&1 | while read -r line; do
              echo "::warning::$line"
            done

          # Count functions exceeding CCN 40
          CRIT_COUNT=$(lizard lib/firmware/ lib/board/ lib/transport/src/ \
            -C 40 -w \
            -x "*/generated/*" -x "*/.pb.*" 2>&1 | wc -l | tr -d ' ')

          echo ""
          echo "Functions with CCN > 40: $CRIT_COUNT (baseline: $BASELINE_CCN40)"

          if [ "$CRIT_COUNT" -gt "$BASELINE_CCN40" ]; then
            echo "::error::New high-complexity functions detected ($CRIT_COUNT > baseline $BASELINE_CCN40)"
            exit 1
          else
            echo "Within baseline tolerance — PASS"
          fi

  # ═══════════════════════════════════════════════════════════
  # STAGE 2: BUILD — compile only after gate passes
  # ═══════════════════════════════════════════════════════════

  build-emulator:
    needs: [lint-format, check-submodules, secret-scan, cppcheck, complexity]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Init submodules
        run: |
          git submodule update --init deps/crypto/trezor-firmware
          git submodule update --init deps/device-protocol
          git submodule update --init deps/python-keepkey
          git submodule update --init deps/googletest
          git submodule update --init deps/qrenc/QR-Code-generator
          git submodule update --init deps/sca-hardening/SecAESSTM32

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache base image
        id: cache-base
        uses: actions/cache@v4
        with:
          path: /tmp/base-image.tar
          key: base-image-${{ env.BASE_IMAGE }}

      - name: Pull and cache base image
        if: steps.cache-base.outputs.cache-hit != 'true'
        run: |
          docker pull ${{ env.BASE_IMAGE }}
          docker save ${{ env.BASE_IMAGE }} -o /tmp/base-image.tar

      - name: Load base image from cache
        if: steps.cache-base.outputs.cache-hit == 'true'
        run: docker load -i /tmp/base-image.tar

      - name: Build emulator image
        run: |
          docker build \
            -t ${{ env.EMU_IMAGE }} \
            -f scripts/emulator/Dockerfile \
            .

      - name: Save emulator image
        run: docker save ${{ env.EMU_IMAGE }} -o /tmp/emu-image.tar

      - name: Upload emulator image artifact
        uses: actions/upload-artifact@v4
        with:
          name: emu-image
          path: /tmp/emu-image.tar
          retention-days: 1

  build-arm-firmware:
    needs: [lint-format, check-submodules, secret-scan, cppcheck, complexity]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Init submodules
        run: |
          git submodule update --init deps/crypto/trezor-firmware
          git submodule update --init deps/device-protocol
          git submodule update --init deps/python-keepkey
          git submodule update --init deps/googletest
          git submodule update --init deps/qrenc/QR-Code-generator
          git submodule update --init deps/sca-hardening/SecAESSTM32

      - name: Cache base image
        id: cache-base
        uses: actions/cache@v4
        with:
          path: /tmp/base-image.tar
          key: base-image-${{ env.BASE_IMAGE }}

      - name: Pull and cache base image
        if: steps.cache-base.outputs.cache-hit != 'true'
        run: |
          docker pull ${{ env.BASE_IMAGE }}
          docker save ${{ env.BASE_IMAGE }} -o /tmp/base-image.tar

      - name: Load base image from cache
        if: steps.cache-base.outputs.cache-hit == 'true'
        run: docker load -i /tmp/base-image.tar

      - name: Cross-compile firmware for ARM
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/root/keepkey-firmware:z \
            ${{ env.BASE_IMAGE }} /bin/sh -c "\
              mkdir /root/build && cd /root/build && \
              cmake -C /root/keepkey-firmware/cmake/caches/device.cmake /root/keepkey-firmware \
                -DCMAKE_BUILD_TYPE=MinSizeRel \
                -DCMAKE_COLOR_MAKEFILE=ON && \
              make && \
              mkdir -p /root/keepkey-firmware/bin && \
              cp bin/*.bin /root/keepkey-firmware/bin/ && \
              cp bin/*.elf /root/keepkey-firmware/bin/"

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-arm
          path: |
            bin/*.bin
            bin/*.elf
          retention-days: 30

  # ═══════════════════════════════════════════════════════════
  # STAGE 2b: SECURITY — deep analysis (parallel with builds)
  # ═══════════════════════════════════════════════════════════

  codeql:
    needs: [lint-format, check-submodules, secret-scan, cppcheck, complexity]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Init required submodules
        run: |
          git submodule update --init deps/crypto/trezor-firmware
          git submodule update --init deps/device-protocol

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: c-cpp
          build-mode: none

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: firmware-security

  # ═══════════════════════════════════════════════════════════
  # STAGE 3: TEST — run only after builds succeed
  # ═══════════════════════════════════════════════════════════

  unit-tests:
    needs: build-emulator
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Download emulator image
        uses: actions/download-artifact@v4
        with:
          name: emu-image
          path: /tmp

      - name: Load emulator image
        run: docker load -i /tmp/emu-image.tar

      - name: Run unit tests
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/test-reports:/kkemu/test-reports \
            --entrypoint /bin/sh \
            ${{ env.EMU_IMAGE }} \
            -c "mkdir -p /kkemu/test-reports/firmware-unit && \
                make xunit || true && \
                cp -r unittests/*.xml /kkemu/test-reports/firmware-unit/ 2>/dev/null || true"

      - name: Upload unit test results
        uses: mikepenz/action-junit-report@v4
        if: always()
        with:
          report_paths: test-reports/firmware-unit/*.xml
          check_name: Unit Tests

  python-integration-tests:
    needs: build-emulator
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Init submodules
        run: |
          git submodule update --init deps/crypto/trezor-firmware
          git submodule update --init deps/device-protocol
          git submodule update --init deps/python-keepkey
          git submodule update --init deps/googletest
          git submodule update --init deps/qrenc/QR-Code-generator
          git submodule update --init deps/sca-hardening/SecAESSTM32

      - name: Download emulator image
        uses: actions/download-artifact@v4
        with:
          name: emu-image
          path: /tmp

      - name: Load emulator image
        run: docker load -i /tmp/emu-image.tar

      - name: Tag image for docker compose
        run: docker tag ${{ env.EMU_IMAGE }} kktech/kkemu:latest

      - name: Run full test suite
        working-directory: scripts/emulator
        run: |
          docker compose up --build --abort-on-container-exit python-keepkey

      - name: Collect test results
        if: always()
        working-directory: scripts/emulator
        run: |
          # After --abort-on-container-exit, containers are stopped.
          # Use -aq to include stopped containers.
          CID=$(docker compose ps -aq python-keepkey | head -1)
          mkdir -p ${{ github.workspace }}/test-reports/python-keepkey
          if [ -n "$CID" ]; then
            docker cp "$CID":/kkemu/test-reports/python-keepkey/junit.xml \
              ${{ github.workspace }}/test-reports/python-keepkey/junit.xml || true
            docker cp "$CID":/kkemu/test-reports/python-keepkey/status \
              ${{ github.workspace }}/test-reports/python-keepkey/status || true
          fi
          STATUS=$(cat ${{ github.workspace }}/test-reports/python-keepkey/status 2>/dev/null || echo "1")
          echo "Python tests exit status: $STATUS"
          [ "$STATUS" = "0" ] || exit 1

      - name: Upload Python test results
        uses: mikepenz/action-junit-report@v4
        if: always()
        with:
          report_paths: test-reports/python-keepkey/junit.xml
          check_name: Python Integration Tests

      - name: Tear down
        if: always()
        working-directory: scripts/emulator
        run: docker compose down -v || true

  # ═══════════════════════════════════════════════════════════
  # STAGE 4: PUBLISH — master only, all tests must pass
  # ═══════════════════════════════════════════════════════════

  publish-emulator:
    needs: [unit-tests, python-integration-tests, build-arm-firmware, codeql]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download emulator image
        uses: actions/download-artifact@v4
        with:
          name: emu-image
          path: /tmp

      - name: Load emulator image
        run: docker load -i /tmp/emu-image.tar

      - name: Extract firmware version
        id: version
        run: |
          FW_VERSION=$(grep 'VERSION' CMakeLists.txt | head -1 | grep -oP '\d+\.\d+\.\d+')
          echo "fw_version=${FW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Firmware version: ${FW_VERSION}"

      - name: Tag images for publish
        run: |
          docker tag ${{ env.EMU_IMAGE }} kktech/kkemu:latest
          docker tag ${{ env.EMU_IMAGE }} kktech/kkemu:v${{ steps.version.outputs.fw_version }}

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.KK_DOCKERHUB_USER }}
          password: ${{ secrets.KK_DOCKERHUB_PASS }}

      - name: Push emulator images
        run: |
          docker push kktech/kkemu:latest
          docker push kktech/kkemu:v${{ steps.version.outputs.fw_version }}
